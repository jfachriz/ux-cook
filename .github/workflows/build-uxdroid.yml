name: build-uxdroid
on:
    push:
        paths:
            - "**.sh"
            - "**.yml"
    workflow_dispatch: {}

jobs:
    BuildTestRaw:
        name: build latest
        runs-on: ubuntu-latest
        steps:
            - name: checkout repo
              uses: actions/checkout@v3
              with:
                  submodules: recursive

            - name: Docker Setup QEMU
              uses: docker/setup-qemu-action@v2

            - name: Satify Dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install git build-essential binfmt-support qemu-user-static debootstrap -y

            - name: Trigger ux-cook
              run: sudo bash .github/scripts/build-uxdroid.sh

            - name: save arm64 builds
              uses: actions/upload-artifact@v4
              with:
                  name: latest-test-raw-arm64
                  path: latest-test-arm64

            - name: save armhf builds
              uses: actions/upload-artifact@v4
              with:
                  name: latest-test-raw-armhf
                  path: latest-test-armhf

            - name: save amd64 builds
              uses: actions/upload-artifact@v4
              with:
                  name: latest-test-raw-amd64
                  path: latest-test-amd64
